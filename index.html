<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorHub // Sakura Theme</title>
    <style>
        :root {
            --sakura: #ffb7c5;
            --sakura-dark: #ff8da1;
            --bg-dark: #1a0f12;
            --card-bg: rgba(40, 25, 30, 0.65);
            --text: #fff0f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(135deg, rgba(26, 15, 18, 0.85), rgba(40, 20, 25, 0.82)),
                url('https://www.icegif.com/wp-content/uploads/2022/03/icegif-578.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 50px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- HEADER & NAV --- */
        header {
            background: rgba(26, 15, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--sakura);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(255, 183, 197, 0.15);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--sakura), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 450px;
            min-width: 250px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-icon-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            opacity: 0.8;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .search-box:focus-within .search-icon-img {
            opacity: 1;
            transform: scale(1.05);
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 183, 197, 0.25);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(5px);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--sakura);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 183, 197, 0.4), inset 0 0 10px rgba(255, 183, 197, 0.1);
        }

        .actions-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 10;
        }

        .fancy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .fancy-btn svg {
            width: 18
